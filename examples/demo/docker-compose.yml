services:
  postgres:
    image: postgres:16-alpine
    container_name: lantern-demo-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lantern_demo
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lantern_demo"]
      interval: 2s
      timeout: 5s
      retries: 20
